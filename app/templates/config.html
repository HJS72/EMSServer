<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EMS Konfiguration</title>
  <style>
    :root {
      --bg: #07111a;
      --card: #0d1b2a;
      --card-strong: #13263b;
      --text: #e8f0f7;
      --muted: #9bb0c3;
      --line: #1f3347;
      --good: #52b788;
      --warn: #e76f51;
      --focus: #4cc9f0;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, #12304a 0, transparent 32%),
        radial-gradient(circle at 88% 18%, #2a1e3f 0, transparent 30%),
        radial-gradient(circle at 82% 82%, #0f3b46 0, transparent 28%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      width: min(1120px, calc(100% - 2rem));
      margin: calc(52px + 1.2rem) auto calc(36px + 2rem);
      display: grid;
      gap: 1rem;
    }

    /* ── App Header ────────────────────────────────────────────── */
    .app-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 52px;
      background: #060e16f0;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .app-header-inner {
      height: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .app-brand {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
    }

    .app-brand-icon { font-size: 1.25rem; line-height: 1; }

    .app-brand-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--focus);
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .app-nav {
      display: flex;
      gap: 0.3rem;
      background: #0b1825cc;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.28rem;
    }

    .app-nav a {
      color: var(--muted);
      text-decoration: none;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      font-size: 0.88rem;
      border: 1px solid transparent;
      transition: 150ms ease;
    }

    .app-nav a.active {
      color: #eaf5ff;
      background: #1a3149;
      border-color: #2a4a67;
    }

    .app-nav a:hover:not(.active) {
      color: #eaf5ff;
      border-color: #2a4a67;
    }

    /* ── App Footer ────────────────────────────────────────────── */
    .app-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      height: 36px;
      background: #050d14e8;
      border-top: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .app-footer-inner {
      height: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .footer-status {
      font-size: 0.8rem;
      color: var(--muted);
      transition: color 0.3s ease;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .footer-status.ok   { color: var(--good); }
    .footer-status.err  { color: var(--warn); }
    .footer-status.info { color: var(--focus); }

    .footer-time {
      font-size: 0.75rem;
      color: #3a5a72;
      white-space: nowrap;
    }

    .hero {
      background: linear-gradient(135deg, #10273b 0%, #183a57 52%, #1f5f7a 100%);
      border-radius: 18px;
      padding: 1rem 1.2rem;
      border: 1px solid #2a4a67;
      box-shadow: 0 18px 44px #02060c66;
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .version-badge {
      font-size: 0.72rem;
      font-weight: 500;
      color: #7aafcc;
      background: #0b1e2e;
      border: 1px solid #2a4a67;
      border-radius: 999px;
      padding: 0.15rem 0.5rem;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }

    .update-btn {
      display: none;
      font-size: 0.72rem;
      font-weight: 600;
      color: #fff;
      background: #e76f51;
      border: none;
      border-radius: 999px;
      padding: 0.2rem 0.65rem;
      cursor: pointer;
      animation: pulse-warn 1.6s ease-in-out infinite;
    }

    @keyframes pulse-warn {
      0%, 100% { box-shadow: 0 0 0 0 #e76f5166; }
      50% { box-shadow: 0 0 0 6px #e76f5100; }
    }

    .hero p {
      margin: 0.45rem 0 0;
      color: #bfd4e4;
    }

    .card {
      background: linear-gradient(180deg, var(--card) 0%, var(--card-strong) 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0.9rem;
      box-shadow: inset 0 1px 0 #ffffff08, 0 14px 36px #02060c40;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      justify-content: space-between;
    }

    .toolbar-left {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }

    .toolbar strong {
      font-size: 0.95rem;
      color: #d6e4f0;
    }

    .devices {
      display: grid;
      gap: 0.75rem;
    }

    .device-card {
      border: 1px solid #2a4158;
      border-radius: 12px;
      background: #0a1622cc;
      overflow: hidden;
    }

    .device-card.dragging {
      opacity: 0.55;
      border-color: var(--focus);
    }

    .device-card.drop-target {
      border-color: var(--focus);
      box-shadow: 0 0 0 1px var(--focus) inset;
    }

    .device-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem;
      background: #0f2233;
      border-bottom: 1px solid #203449;
    }

    .drag-handle {
      cursor: grab;
      color: #8fb5d1;
      user-select: none;
      font-size: 1rem;
      line-height: 1;
    }

    .drag-handle:active { cursor: grabbing; }

    .device-title-wrap {
      flex: 1;
      min-width: 0;
    }

    .device-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #eef5fb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .device-type {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .device-actions {
      display: flex;
      gap: 0.45rem;
      align-items: center;
    }

    .device-body {
      padding: 0.75rem;
      display: grid;
      gap: 0.55rem;
    }

    .device-card.collapsed .device-body {
      display: none;
    }

    .field-grid {
      display: grid;
      gap: 0.55rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field.field-full {
      grid-column: 1 / -1;
    }

    .field {
      display: grid;
      gap: 0.25rem;
    }

    .field label {
      font-size: 0.79rem;
      color: #a9bfd2;
    }

    input[type="text"],
    select {
      width: 100%;
      border: 1px solid #2b465f;
      background: #0a1622;
      color: #ebf4fb;
      border-radius: 8px;
      padding: 0.45rem 0.55rem;
      font-size: 0.9rem;
    }

    input[type="checkbox"] {
      transform: translateY(1px);
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: #c9d9e7;
      font-size: 0.86rem;
    }

    button {
      border: 1px solid #2f4e6b;
      color: #e8f0f7;
      background: #17324a;
      border-radius: 10px;
      padding: 0.45rem 0.75rem;
      font-size: 0.9rem;
      cursor: pointer;
    }

    button:hover { background: #1d3c59; }
    button.secondary { background: #0d1d2c; }
    button.remove-btn { border-color: #6b2e2e; background: #3a1d1d; }

    .status {
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 1.4em;
    }

    .status.ok { color: var(--good); }
    .status.err { color: var(--warn); }

  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="app-brand">
        <span class="app-brand-icon">⚡</span>
        <span class="app-brand-name">EMS Forecast</span>
        <span class="version-badge" id="versionBadge">v{{ version }}</span>
        <button class="update-btn" id="updateBtn" onclick="applyUpdate()">Update verfügbar ↑</button>
      </div>
      <nav class="app-nav" aria-label="Hauptmenu">
        <a href="/">Dashboard</a>
        <a class="active" href="/config">Konfiguration</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="toolbar">
        <div class="toolbar-left">
          <strong>Gerate</strong>
          <select id="newDeviceType">
            <option value="pv">PV-Anlage</option>
            <option value="pv_battery">PV-Anlage mit Batterie</option>
            <option value="consumer">Verbraucher</option>
            <option value="controllable_consumer">Steuerbarer Verbraucher</option>
            <option value="grid">Netz</option>
          </select>
          <button class="secondary" id="addDeviceBtn">+ Gerat</button>
        </div>
        <div id="status" class="status"></div>
      </div>
    </section>

    <section class="card">
      <div id="devices" class="devices"></div>
      <div class="toolbar" style="margin-top: 0.75rem;">
        <span class="status">Hinweis: Karten per Griff links verschieben, um die Reihenfolge zu andern.</span>
        <button id="saveBtn">Speichern</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <div class="app-footer-inner">
      <span id="footerStatus" class="footer-status"></span>
      <span id="footerTime" class="footer-time"></span>
    </div>
  </footer>

  <script>
    const els = {
      devices: document.getElementById("devices"),
      status: document.getElementById("status"),
      saveBtn: document.getElementById("saveBtn"),
      addDeviceBtn: document.getElementById("addDeviceBtn"),
      newDeviceType: document.getElementById("newDeviceType"),
    };

    const appState = {
      devices: [],
      dragId: "",
    };

    const typeMeta = {
      pv: {label: "PV-Anlage", icon: ""},
      pv_battery: {label: "PV-Anlage mit Batterie", icon: ""},
      consumer: {label: "Verbraucher", icon: "LOAD"},
      controllable_consumer: {label: "Steuerbarer Verbraucher", icon: "CTRL"},
      grid: {label: "Netz", icon: "GRID"},
    };

    function setStatus(text, kind = "") {
      els.status.textContent = text;
      els.status.className = kind ? `status ${kind}` : "status";
      showFooterStatus(text, kind);
    }

    function showFooterStatus(msg, kind = '') {
      const el = document.getElementById('footerStatus');
      if (!el) return;
      el.textContent = msg;
      el.className = 'footer-status' + (kind ? ` ${kind}` : '');
      const timeEl = document.getElementById('footerTime');
      if (timeEl && msg) timeEl.textContent = new Date().toLocaleTimeString('de-DE');
      if (kind === 'ok' || kind === 'info') {
        clearTimeout(el._timer);
        el._timer = setTimeout(() => {
          el.textContent = '';
          el.className = 'footer-status';
        }, 5000);
      }
    }

    function uid(prefix) {
      return `${prefix}-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
    }

    function inferType(device) {
      if (device.type) return device.type;
      if (device.kind === "generator") return device.has_battery ? "pv_battery" : "pv";
      if (device.kind === "consumer") return "consumer";
      if (device.kind === "controllable") return "controllable_consumer";
      if (device.kind === "grid") return "grid";
      return "consumer";
    }

    function toUiDevices(cfg) {
      const byId = {};
      (cfg.generators || []).forEach((g, idx) => {
        const id = g.id || `gen-${idx + 1}`;
        byId[id] = {
          id,
          kind: "generator",
          type: g.has_battery ? "pv_battery" : "pv",
          name: g.name || "PV-Anlage",
          state_key: g.state_key || "",
          source: g.source || "influx",
          power_state_key: g.power_state_key || "",
          power_source: g.power_source || "iobroker",
          has_battery: !!g.has_battery,
          collapsed: false,
        };
      });
      (cfg.consumers || []).forEach((c, idx) => {
        const id = c.id || `consumer-${idx + 1}`;
        byId[id] = {
          id,
          kind: "consumer",
          type: "consumer",
          name: c.name || "Verbraucher",
          state_key: c.state_key || "",
          source: c.source || "influx",
          power_state_key: c.power_state_key || "",
          power_source: c.power_source || "iobroker",
          collapsed: false,
        };
      });
      (cfg.controllable_consumers || []).forEach((c, idx) => {
        const id = c.id || `ctrl-${idx + 1}`;
        byId[id] = {
          id,
          kind: "controllable",
          type: "controllable_consumer",
          name: c.name || "Steuerbarer Verbraucher",
          state_key: c.state_key || "",
          control_key: c.control_key || "",
          source: c.source || "influx",
          power_state_key: c.power_state_key || "",
          power_source: c.power_source || "iobroker",
          collapsed: false,
        };
      });

      const gridId = cfg.grid?.id || "grid-main";
      byId[gridId] = {
        id: gridId,
        kind: "grid",
        type: "grid",
        name: "Netz",
        import_state_key: cfg.grid?.import_state_key || "",
        export_state_key: cfg.grid?.export_state_key || "",
        import_source: cfg.grid?.import_source || "influx",
        export_source: cfg.grid?.export_source || "influx",
          power_state_key: cfg.grid?.power_state_key || "",
          power_source: cfg.grid?.power_source || "iobroker",
          power_sign: cfg.grid?.power_sign || "import_positive",
        collapsed: false,
      };

      const ids = cfg.device_order && cfg.device_order.length ? cfg.device_order : Object.keys(byId);
      const devices = ids.filter(id => byId[id]).map(id => byId[id]);
      Object.keys(byId).forEach(id => {
        if (!devices.find(d => d.id === id)) devices.push(byId[id]);
      });
      return devices;
    }

    function buildPayload() {
      const consumers = [];
      const controllable_consumers = [];
      const generators = [];

      let gridDevice = appState.devices.find(d => inferType(d) === "grid");
      if (!gridDevice) {
        gridDevice = {
          id: "grid-main",
          import_state_key: "",
          export_state_key: "",
          import_source: "influx",
          export_source: "influx",
            power_state_key: "",
            power_source: "iobroker",
            power_sign: "import_positive",
        };
      }

      appState.devices.forEach(d => {
        const type = inferType(d);
        if (type === "consumer") {
          if (!(d.name || d.state_key || d.power_state_key)) return;
          consumers.push({
            id: d.id,
            name: d.name || "Verbraucher",
            state_key: d.state_key || "",
            source: d.source || "influx",
            power_state_key: d.power_state_key || "",
            power_source: d.power_source || "iobroker",
          });
        }
        if (type === "controllable_consumer") {
          if (!(d.name || d.state_key || d.control_key || d.power_state_key)) return;
          controllable_consumers.push({
            id: d.id,
            name: d.name || "Steuerbarer Verbraucher",
            state_key: d.state_key || "",
            control_key: d.control_key || "",
            source: d.source || "influx",
            power_state_key: d.power_state_key || "",
            power_source: d.power_source || "iobroker",
          });
        }
        if (type === "pv" || type === "pv_battery") {
          if (!(d.name || d.state_key || d.power_state_key)) return;
          generators.push({
            id: d.id,
            name: d.name || "PV-Anlage",
            state_key: d.state_key || "",
            has_battery: type === "pv_battery",
            source: d.source || "influx",
            power_state_key: d.power_state_key || "",
            power_source: d.power_source || "iobroker",
          });
        }
      });

      return {
        consumers,
        controllable_consumers,
        generators,
        grid: {
          id: gridDevice.id || "grid-main",
          import_state_key: gridDevice.import_state_key || "",
          export_state_key: gridDevice.export_state_key || "",
          import_source: gridDevice.import_source || "influx",
          export_source: gridDevice.export_source || "influx",
           power_state_key: gridDevice.power_state_key || "",
           power_source: gridDevice.power_source || "iobroker",
           power_sign: gridDevice.power_sign || "import_positive",
        },
        device_order: appState.devices.map(d => d.id),
      };
    }

    function field(label, key, value, placeholder = "", sourceOptions = false, fullWidth = false) {
      const wrap = document.createElement("div");
      wrap.className = "field" + (fullWidth ? " field-full" : "");

      const labelEl = document.createElement("label");
      labelEl.textContent = label;
      wrap.appendChild(labelEl);

      if (sourceOptions) {
        const select = document.createElement("select");
        ["influx", "iobroker"].forEach(v => {
          const o = document.createElement("option");
          o.value = v;
          o.textContent = v === "iobroker" ? "ioBroker" : "InfluxDB";
          select.appendChild(o);
        });
        select.value = value || "influx";
        select.addEventListener("change", () => key.setter(select.value));
        wrap.appendChild(select);
      } else {
        const input = document.createElement("input");
        input.type = "text";
        input.value = value || "";
        input.placeholder = placeholder;
        input.addEventListener("input", () => key.setter(input.value));
        wrap.appendChild(input);
      }

      return wrap;
    }

    function renderDeviceBody(device, body) {
      body.innerHTML = "";
      const grid = document.createElement("div");
      grid.className = "field-grid";

      // Text inputs: update device data only, no full re-render (prevents focus loss)
      const bind = (k) => ({
        setter: (val) => {
          device[k] = val;
          if (k === "name") {
            const card = document.querySelector(`[data-device-id="${device.id}"]`);
            if (card) {
              const t = card.querySelector(".device-title");
              if (t) t.textContent = val || typeMeta[inferType(device)].label;
            }
          }
        }
      });
      // Source selects: re-render on change
      const bindSrc = (k) => ({ setter: (val) => { device[k] = val; renderDevices(); } });

      if (inferType(device) === "grid") {
        grid.appendChild(field("Bezug Energie (kWh)", bind("import_state_key"), device.import_state_key, "EMS.Grid.Energie.in"));
        grid.appendChild(field("Bezug Quelle", bindSrc("import_source"), device.import_source, "", true));
        grid.appendChild(field("Einspeisung Energie (kWh)", bind("export_state_key"), device.export_state_key, "EMS.Grid.Energie.out"));
        grid.appendChild(field("Einspeisung Quelle", bindSrc("export_source"), device.export_source, "", true));
        grid.appendChild(field("Leistung (W)", bind("power_state_key"), device.power_state_key, "EMS.Grid.Leistung"));
        grid.appendChild(field("Leistung Quelle", bindSrc("power_source"), device.power_source, "", true));
        // power sign convention select
        const signWrap = document.createElement("div");
        signWrap.className = "field field-full";
        const signLabel = document.createElement("label");
        signLabel.textContent = "Vorzeichen Leistung";
        const signSelect = document.createElement("select");
        [["import_positive", "Bezug positiv (Einspeisung negativ)"], ["export_positive", "Einspeisung positiv (Bezug negativ)"]].forEach(([v, t]) => {
          const o = document.createElement("option"); o.value = v; o.textContent = t; signSelect.appendChild(o);
        });
        signSelect.value = device.power_sign || "import_positive";
        signSelect.addEventListener("change", () => { device.power_sign = signSelect.value; renderDevices(); });
        signWrap.appendChild(signLabel);
        signWrap.appendChild(signSelect);
        grid.appendChild(signWrap);
        } else {
        grid.appendChild(field("Name", bind("name"), device.name, "Gerätename", false, true));
        grid.appendChild(field("Energie (kWh)", bind("state_key"), device.state_key, "State-Key Energie"));
        grid.appendChild(field("Energie Quelle", bindSrc("source"), device.source, "", true));
        grid.appendChild(field("Leistung (W)", bind("power_state_key"), device.power_state_key, "State-Key Leistung"));
        grid.appendChild(field("Leistung Quelle", bindSrc("power_source"), device.power_source, "", true));

        if (inferType(device) === "controllable_consumer") {
          grid.appendChild(field("Control-Key", bind("control_key"), device.control_key, "Schalt- oder Regel-State", false, true));
        }

      }

      body.appendChild(grid);
    }

    function renderDevices() {
      els.devices.innerHTML = "";

      appState.devices.forEach(device => {
        const card = document.createElement("article");
        card.className = `device-card${device.collapsed ? " collapsed" : ""}`;
        card.dataset.deviceId = device.id;

        card.addEventListener("dragover", (ev) => {
          ev.preventDefault();
          card.classList.add("drop-target");
        });
        card.addEventListener("dragleave", () => card.classList.remove("drop-target"));
        card.addEventListener("drop", (ev) => {
          ev.preventDefault();
          card.classList.remove("drop-target");
          const targetId = card.dataset.deviceId;
          moveDevice(appState.dragId, targetId);
        });

        const header = document.createElement("div");
        header.className = "device-header";

        const drag = document.createElement("span");
        drag.className = "drag-handle";
        drag.textContent = "::";
        drag.draggable = true;
        drag.addEventListener("dragstart", () => {
          appState.dragId = device.id;
          card.classList.add("dragging");
        });
        drag.addEventListener("dragend", () => {
          appState.dragId = "";
          card.classList.remove("dragging");
          document.querySelectorAll(".drop-target").forEach(el => el.classList.remove("drop-target"));
        });

        const titleWrap = document.createElement("div");
        titleWrap.className = "device-title-wrap";

        const title = document.createElement("div");
        title.className = "device-title";
        title.textContent = device.name || typeMeta[inferType(device)].label;

        const type = document.createElement("div");
        type.className = "device-type";
        const meta = typeMeta[inferType(device)];
        type.textContent = meta.icon ? `${meta.icon} ${meta.label}` : meta.label;

        titleWrap.appendChild(title);
        titleWrap.appendChild(type);

        const actions = document.createElement("div");
        actions.className = "device-actions";

        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "secondary";
        toggle.textContent = device.collapsed ? "Aufklappen" : "Einklappen";
        toggle.addEventListener("click", () => {
          device.collapsed = !device.collapsed;
          renderDevices();
        });

        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "remove-btn";
        remove.textContent = "Entfernen";
        remove.addEventListener("click", () => {
          appState.devices = appState.devices.filter(d => d.id !== device.id);
          renderDevices();
        });
        if (inferType(device) === "grid") {
          remove.disabled = true;
          remove.title = "Netz ist Pflicht";
        }

        actions.appendChild(toggle);
        actions.appendChild(remove);

        header.appendChild(drag);
        header.appendChild(titleWrap);
        header.appendChild(actions);

        const body = document.createElement("div");
        body.className = "device-body";
        renderDeviceBody(device, body);

        card.appendChild(header);
        card.appendChild(body);
        els.devices.appendChild(card);
      });
    }

    function moveDevice(fromId, toId) {
      if (!fromId || !toId || fromId === toId) return;
      const fromIdx = appState.devices.findIndex(d => d.id === fromId);
      const toIdx = appState.devices.findIndex(d => d.id === toId);
      if (fromIdx < 0 || toIdx < 0) return;

      const [moved] = appState.devices.splice(fromIdx, 1);
      appState.devices.splice(toIdx, 0, moved);
      renderDevices();
    }

    function addDevice(type) {
      if (type === "grid" && appState.devices.some(d => inferType(d) === "grid")) {
        setStatus("Es existiert bereits ein Netz-Gerat", "err");
        return;
      }

      let device;
      if (type === "pv" || type === "pv_battery") {
        device = {
          id: uid("gen"),
          kind: "generator",
          type,
          name: type === "pv_battery" ? "PV mit Batterie" : "PV-Anlage",
          state_key: "",
          source: "influx",
          power_state_key: "",
          power_source: "iobroker",
          has_battery: type === "pv_battery",
          collapsed: false,
        };
      } else if (type === "controllable_consumer") {
        device = {
          id: uid("ctrl"),
          kind: "controllable",
          type,
          name: "Steuerbarer Verbraucher",
          state_key: "",
          control_key: "",
          source: "influx",
          power_state_key: "",
          power_source: "iobroker",
          collapsed: false,
        };
      } else if (type === "grid") {
        device = {
          id: "grid-main",
          kind: "grid",
          type,
          name: "Netz",
          import_state_key: "",
          export_state_key: "",
          import_source: "influx",
          export_source: "influx",
            power_state_key: "",
            power_source: "iobroker",
            power_sign: "import_positive",
          collapsed: false,
        };
      } else {
        device = {
          id: uid("consumer"),
          kind: "consumer",
          type: "consumer",
          name: "Verbraucher",
          state_key: "",
          source: "influx",
          power_state_key: "",
          power_source: "iobroker",
          collapsed: false,
        };
      }

      appState.devices.push(device);
      renderDevices();
      setStatus("Neues Gerat angelegt", "ok");
    }

    async function loadConfig() {
      setStatus("Lade Konfiguration...");
      const res = await fetch("/api/config/datapoints");
      if (!res.ok) throw new Error("Konfiguration konnte nicht geladen werden");
      const cfg = await res.json();
      appState.devices = toUiDevices(cfg);
      renderDevices();
      setStatus("Konfiguration geladen", "ok");
    }

    async function saveConfig() {
      setStatus("Speichere...");
      const payload = buildPayload();
      const res = await fetch("/api/config/datapoints", {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error("Speichern fehlgeschlagen");
      setStatus("Konfiguration gespeichert", "ok");
    }

    els.addDeviceBtn.addEventListener("click", () => addDevice(els.newDeviceType.value));

    els.saveBtn.addEventListener("click", async () => {
      try {
        await saveConfig();
      } catch (err) {
        console.error(err);
        setStatus("Speichern fehlgeschlagen", "err");
      }
    });

    loadConfig().catch(err => {
      console.error(err);
      setStatus("Laden fehlgeschlagen", "err");
    });

    async function checkUpdate() {
      try {
        const r = await fetch("/api/update/check");
        const d = await r.json();
        if (d.update_available) {
          const btn = document.getElementById("updateBtn");
          if (btn) {
            btn.textContent = `Update -> v${d.latest} ↑`;
            btn.style.display = "inline-block";
          }
        }
      } catch (_) {}
    }

    async function applyUpdate() {
      const btn = document.getElementById("updateBtn");
      if (btn) { btn.textContent = "Aktualisiere..."; btn.disabled = true; }
      try {
        const r = await fetch("/api/update/apply", { method: "POST" });
        const d = await r.json();
        if (d.status === "ok") {
          alert("Update erfolgreich. Server wird neu gestartet...");
        } else {
          alert("Fehler beim Update:\n" + (d.output || d.error));
          if (btn) { btn.disabled = false; }
        }
      } catch (e) {
        alert("Update fehlgeschlagen: " + e);
        if (btn) { btn.disabled = false; }
      }
    }

    checkUpdate();
    setInterval(checkUpdate, 60 * 60 * 1000);
  </script>
</body>
</html>
